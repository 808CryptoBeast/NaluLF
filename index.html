<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NaluLF" />
  <meta name="application-name" content="NaluLF" />
  <meta name="description" content="NaluLF — XRPL Real-Time Forensic Intelligence Suite" />
  <meta name="theme-color" content="#0c0e14" />
  <meta name="msapplication-TileColor" content="#0c0e14" />
  <title>NaluLF 🌊</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="NaluLF/manifest.json" />

  <!-- Apple touch icons (required for iOS home screen install) -->
  <link rel="apple-touch-icon" sizes="180x180" href="NaluLF/icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="NaluLF/icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="NaluLF/icons/icon-120.png" />

  <!-- iOS splash screens (portrait, key sizes) -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
    href="NaluLF/splash/splash-1290x2796.png" />
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
    href="NaluLF/splash/splash-1179x2556.png" />
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
    href="NaluLF/splash/splash-1170x2532.png" />
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)"
    href="NaluLF/splash/splash-1125x2436.png" />
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)"
    href="NaluLF/splash/splash-750x1334.png" />

  <!-- Inline SVG favicon — no 404 -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Ctext x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' font-size='20' fill='%2300fff0'%3E%E2%89%8B%3C/text%3E%3C/svg%3E" />

  <!-- Single CSS entry point -->
  <link rel="stylesheet" href="NaluLF/css/main.css" />
</head>

<body class="landing-page theme-gold">

  <div class="background-effects" aria-hidden="true"></div>
  <canvas id="particle-canvas" aria-hidden="true"></canvas>

  <nav class="top-navbar" id="main-nav" role="navigation" aria-label="Main navigation">

    <div class="navbar-brand" onclick="goHome()" role="button" tabindex="0" aria-label="NaluLF home">
      <img class="brand-glyph" src="NaluLF/images/NLF-Shield-blue.jpg" alt="NaluLF Shield" />
      <div class="brand-text">
        <span class="brand-name">NaluLF</span>
        <span class="brand-slogan">Riding The Ledger Waves</span>
      </div>
    </div>

    <div class="xrp-price-pill" id="xrp-price-pill" title="XRP / USD — updates every 30s">
      <span class="xrp-logo">✕</span>
      <span class="xrp-price-val" id="xrpPrice">—</span>
      <span class="xrp-price-change flat" id="xrpChange">—</span>
    </div>

    <div class="navbar-conn" id="navbar-conn" style="display:none" role="status" aria-live="polite">
      <span id="connDot" class="conn-dot"></span>
      <span id="connText">Connecting…</span>
      <span class="conn-endpoint-small" id="conn-endpoint-small"></span>
    </div>

    <div class="navbar-center-hint" id="cmdk-hint" style="display:none">
      <kbd>⌘K</kbd> / <kbd>/</kbd> to search
    </div>

    <div class="navbar-actions" id="navbar-landing-actions">
      <button class="landing-btn ghost btn-sm" onclick="openAuth('login')">Sign In</button>
      <button class="landing-btn primary btn-sm" onclick="openAuth('signup')">
        <span class="btn-shimmer" aria-hidden="true"></span>
        Get Started
      </button>
    </div>

    <div class="navbar-actions" id="navbar-dash-actions" style="display:none">
      <div class="user-chip" onclick="showProfile()" style="cursor:pointer" title="View profile">
        <div class="user-avatar" id="user-avatar">?</div>
        <span id="user-name">—</span>
      </div>
      <button class="landing-btn ghost btn-sm" onclick="showProfile()">Profile</button>
      <button class="landing-btn ghost btn-sm" onclick="logout()">Exit</button>
    </div>

  </nav>

  <main id="landing" aria-label="Landing page">
    <!-- your content stays the same -->
  </main>

  <section id="dashboard" class="page-section" style="display:none" aria-label="Dashboard">
    <div class="dashboard-page">

      <div class="dashboard-header">
        <div class="network-selector" role="group" aria-label="Network selection">
          <span class="selector-label">Network:</span>
          <button class="net-btn active" data-network="xrpl-mainnet" aria-pressed="true">
            <img src="NaluLF/images/xrpl mainnet.jpg" class="net-icon" alt="" onerror="this.style.display='none'" />
            Mainnet
          </button>
          <button class="net-btn" data-network="xrpl-testnet" aria-pressed="false">
            <img src="NaluLF/images/xrptestnet.jpg" class="net-icon" alt="" onerror="this.style.display='none'" />
            Testnet
          </button>
          <button class="net-btn" data-network="xahau-mainnet" aria-pressed="false">
            <img src="NaluLF/images/xahau.jpg" class="net-icon" alt="" onerror="this.style.display='none'" />
            Xahau
          </button>
        </div>
        <div class="connection-box" role="status" aria-live="polite">
          <span id="connDot2" class="conn-dot"></span>
          <span id="connText2">Connecting…</span>
        </div>
      </div>

      <!-- rest of dashboard unchanged -->
    </div>
  </section>

  <section id="profile-page" class="page-section" style="display:none" aria-label="Profile">
    <!-- unchanged -->
  </section>

  <div class="profile-modal-overlay" id="profile-editor-modal" role="dialog" aria-modal="true">
    <!-- unchanged -->
  </div>

  <div class="profile-modal-overlay" id="social-modal" role="dialog" aria-modal="true">
    <!-- unchanged -->
  </div>

  <div class="wallet-creator-overlay" id="wallet-creator-overlay" role="dialog" aria-modal="true">
    <!-- unchanged -->
  </div>

  <div class="auth-overlay" id="auth-overlay" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title" data-mode="login">
    <!-- unchanged -->
  </div>

  <div id="cmdkOverlay" class="cmdk-overlay" role="dialog" aria-modal="true" aria-label="Command palette">
    <!-- unchanged -->
  </div>

  <div id="notifications" class="notifications" aria-live="polite" aria-label="Notifications"></div>

  <script type="module" src="NaluLF/scripts/main.js"></script>

</body>
</html>
